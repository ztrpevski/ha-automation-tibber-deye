  - delay: "00:00:01"

  - alias: Notify sell mode detection details when unavailable
    if:
      - condition: template
        value_template: "{{ not (sell_mode_available | bool(false)) }}"
    then:
      - service: persistent_notification.create
        data:
          title: Tibber Deye sell mode unavailable
          message: >-
            Sell/export mode could not be resolved from inverter option lists.
            Requested manual override: {{ manual_sell_option_requested if (manual_sell_option_requested | string | trim) != '' else 'none' }}.
            Resolved sell option: {{ sell_option }}.
            Arbitrage enabled: {{ 'yes' if arbitrage_enabled | bool(false) else 'no' }}.
            Sell active: {{ 'yes' if arbitrage_sell_active | bool(false) else 'no' }}.
            Spread {{ selected_spread | float(0) | round(4) }} EUR/kWh, threshold {{ min_price_spread_eur_kwh | float(0) | round(4) }}.
            Program 1 options: {{ sell_options_program_1 }}.
            Program 2 options: {{ sell_options_program_2 }}.
            Program 3 options: {{ sell_options_program_3 }}.
            Program 4 options: {{ sell_options_program_4 }}.
            Program 5 options: {{ sell_options_program_5 }}.
            Program 6 options: {{ sell_options_program_6 }}.
            To force a known label, set input_text.tibber_deye_manual_sell_option exactly to one of the listed option values.

  - alias: Optional debug notification
    if:
      - condition: template
        value_template: "{{ is_state('input_boolean.tibber_deye_debug_notifications', 'on') }}"
    then:
      - service: persistent_notification.create
        data:
          title: Tibber Deye smart schedule updated
          message: >-
            Planning 48h window (today+tomorrow).
            Now {{ now().strftime('%Y-%m-%d %H:%M:%S') }}.
            Slots: {{ price_count }} x {{ slot_minutes }} min.
            Start index floor {{ min_start_index }}.
            Charge index raw {{ charge_start_index }}, effective {{ charge_start_index_effective }}.
            Sell index {{ sell_start_index }}.
            Charge {{ charge_start_time }}-{{ charge_end_time }} using {{ charge_slots }} slot(s),
            estimated need {{ charge_energy_needed_kwh | float(0) | round(2) }} kWh,
            average price {{ charge_avg_price | float(0) | round(4) }}.
            Sell {{ sell_start_time }}-{{ sell_end_time }} using {{ sell_slots }} slot(s),
            estimated available {{ sell_energy_available_kwh | float(0) | round(2) }} kWh,
            average price {{ sell_avg_price | float(0) | round(4) }}.
            Spread {{ selected_spread | float(0) | round(4) }} EUR/kWh;
            force sell/export {{ 'on' if force_sell_export | bool(false) else 'off' }};
            manual sell override {{ manual_sell_option_requested if (manual_sell_option_requested | string | trim) != '' else 'none' }};
            resolved sell option {{ sell_option }};
            sell mode available {{ 'yes' if sell_mode_available | bool(false) else 'no' }};
            sell active {{ 'yes' if arbitrage_sell_active | bool(false) else 'no' }};
            arbitrage {{ 'enabled' if arbitrage_enabled | bool(false) else 'blocked by spread guard' }}.
            Hourly analysis:
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set n = prices | count %}
            {% set start_i = min_start_index | int(0) %}
            {% set end_i = [start_i + 24, n] | min %}
            {% for i in range(start_i, end_i) %}
            {% set m = i * (slot_minutes | int(60)) %}
            {% set hhmm = "%02d:%02d" | format((m // 60) % 24, m % 60) %}
            {% set item = prices[i] %}
            {% set p = item.total | default(item.price | default(item)) | float(0) %}
            {% if i >= (charge_start_index_effective | int(0)) and i < ((charge_start_index_effective | int(0)) + (charge_slots | int(1))) %}
            {% set mode = 'CHARGE(Grid)' %}
            {% elif arbitrage_sell_active | bool(false) and i >= (sell_start_index | int(0)) and i < ((sell_start_index | int(0)) + (sell_slots | int(1))) %}
            {% set mode = 'SELL(' ~ (sell_option | string) ~ ')' %}
            {% else %}
            {% set mode = 'NEUTRAL' %}
            {% endif %}
            {{ hhmm }} price={{ p | round(4) }} -> {{ mode }}
            {% endfor %}
  
- id: tibber_deye_low_soc_emergency_charge
  alias: Tibber Deye - Emergency Low SOC Grid Charge v9
  description: If battery SOC becomes critically low, start a conservative grid charge immediately
  mode: single
  trigger:
    - platform: template
      value_template: >-
        {{ states('sensor.inverter_battery_capacity') | float(100) < states('input_number.tibber_deye_emergency_soc_below') | float(18) }}
  condition: []
  action:
    - service: script.turn_on
      target:
        entity_id: script.tibber_inverter_tou_mode
    - wait_template: "{{ is_state('script.tibber_inverter_tou_mode', 'off') }}"
      timeout: "00:02:00"
      continue_on_timeout: true
    - service: select.select_option
      target:
        entity_id: select.inverter_program_1_charging
      data:
        option: Grid
    - service: number.set_value
      target:
        entity_id: number.inverter_program_1_power
      data:
        value: >-
          {% set desired = states('input_number.tibber_deye_emergency_charge_power_w') | float(4000) %}
          {% set minv = state_attr('number.inverter_program_1_power', 'min') | float(0) %}
          {% set maxv = state_attr('number.inverter_program_1_power', 'max') | float(desired) %}
          {{ [[desired, minv] | max, maxv] | min }}
    - service: number.set_value
      target:
        entity_id: number.inverter_program_1_soc
      data:
        value: "{{ states('input_number.tibber_deye_emergency_charge_target_soc') | float(40) }}"
    - service: time.set_value
      target:
        entity_id: time.inverter_program_1_time
      data:
        time: "{{ now().strftime('%H:%M:%S') }}"
