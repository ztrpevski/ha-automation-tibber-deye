                Program 5 options: {{ sell_options_program_5 }}.
                Program 6 options: {{ sell_options_program_6 }}.
                To force a known sell/export/discharge label, set input_text.tibber_deye_manual_sell_option exactly to that option value. Grid, Generator, and Both are ignored for sell periods.

      - alias: Optional debug notification
        if:
          - condition: template
            value_template: "{{ is_state('input_boolean.tibber_deye_debug_notifications', 'on') }}"
        then:
          - service: persistent_notification.create
            data:
              title: Tibber Deye smart schedule updated
              message: >-
                Planning 48h window (today+tomorrow).
                Now {{ now().strftime('%Y-%m-%d %H:%M:%S') }}.
                Slots: {{ price_count }} x {{ slot_minutes }} min.
                Start index floor {{ min_start_index }}.
                Charge index raw {{ charge_start_index }}, effective {{ charge_start_index_effective }}.
                Sell index {{ sell_start_index }}.
                Charge {{ charge_start_time }}-{{ charge_end_time }} using {{ charge_slots }} slot(s),
                estimated need {{ charge_energy_needed_kwh | float(0) | round(2) }} kWh,
                average price {{ charge_avg_price | float(0) | round(4) }}.
                Sell {{ sell_start_time }}-{{ sell_end_time }} using {{ sell_slots }} slot(s),
                estimated available {{ sell_energy_available_kwh | float(0) | round(2) }} kWh,
                average price {{ sell_avg_price | float(0) | round(4) }}.
                Spread {{ selected_spread | float(0) | round(4) }} EUR/kWh;
                force sell/export {{ 'on' if force_sell_export | bool(false) else 'off' }};
                manual sell override {{ manual_sell_option_requested if (manual_sell_option_requested | string | trim) != '' else 'none' }};
                resolved sell option {{ sell_option }};
                sell mode available {{ 'yes' if sell_mode_available | bool(false) else 'no' }};
                sell active {{ 'yes' if arbitrage_sell_active | bool(false) else 'no' }};
                arbitrage {{ 'enabled' if arbitrage_enabled | bool(false) else 'blocked by spread guard' }}.
                Hourly analysis:
                {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
                {% set n = prices | count %}
                {% set start_i = min_start_index | int(0) %}
                {% set end_i = [start_i + 24, n] | min %}
                {% for i in range(start_i, end_i) %}
                {% set m = i * (slot_minutes | int(60)) %}
                {% set hhmm = "%02d:%02d" | format((m // 60) % 24, m % 60) %}
                {% set item = prices[i] %}
                {% set p = item.total | default(item.price | default(item)) | float(0) %}
                {% if i >= (charge_start_index_effective | int(0)) and i < ((charge_start_index_effective | int(0)) + (charge_slots | int(1))) %}
                {% set mode = 'CHARGE(Grid)' %}
                {% elif arbitrage_sell_active | bool(false) and i >= (sell_start_index | int(0)) and i < ((sell_start_index | int(0)) + (sell_slots | int(1))) %}
                {% set mode = 'SELL(' ~ (sell_option | string) ~ ')' %}
                {% else %}
                {% set mode = 'NEUTRAL' %}
                {% endif %}
                {{ hhmm }} price={{ p | round(4) }} -> {{ mode }}
                {% endfor %}

  - id: tibber_deye_grid_charge_current_steps
    alias: Tibber Deye - Grid Charge Current Steps v9
    description: Sets battery grid-charging current at 08:00, 09:00, 10:00, and during the cheapest Tibber slot
    mode: restart
    trigger:
      - platform: time
        at: "08:00:00"
        id: morning_08
      - platform: time
        at: "09:00:00"
        id: morning_09
      - platform: time
        at: "10:00:00"
        id: morning_10
      - platform: time_pattern
        minutes: "/5"
        id: cheapest_slot
    condition:
      - condition: template
        value_template: >-
          {{ states('number.inverter_battery_grid_charging_current') not in ['unknown', 'unavailable', 'none', ''] }}
    action:
      - variables:
          grid_charge_current_entity: number.inverter_battery_grid_charging_current
          grid_charge_current_trigger_id: "{{ trigger.id | default('manual') }}"
          grid_charge_current_prices: >-
            {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
            {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
            {{ (today + tomorrow) if (today | count > 0 or tomorrow | count > 0) else [] }}
          grid_charge_current_slot_minutes: >-
            {% set prices = grid_charge_current_prices if grid_charge_current_prices is sequence and grid_charge_current_prices is not string else [] %}
            {% if prices | count > 1 %}
              {% set a = prices[0] %}
              {% set b = prices[1] %}
              {% set a_ts = as_timestamp(a.startsAt | default(a.start | default(a.starts_at | default(a.start_time | default(a.time | default(''))))), 0) %}
              {% set b_ts = as_timestamp(b.startsAt | default(b.start | default(b.starts_at | default(b.start_time | default(b.time | default(''))))), 0) %}
              {% set diff = ((b_ts - a_ts) / 60) | int(0) %}
              {{ diff if diff in [15, 30, 60] else (15 if prices | count > 24 else 60) }}
            {% else %}
              {{ 15 if prices | count > 24 else 60 }}
            {% endif %}
          grid_charge_current_cheapest_active: >-
            {% set prices = grid_charge_current_prices if grid_charge_current_prices is sequence and grid_charge_current_prices is not string else [] %}
            {% set slot_min = grid_charge_current_slot_minutes | int(60) %}
            {% set now_ts = as_timestamp(now()) %}
            {% set ns = namespace(best=999999999, ts=0) %}
            {% for item in prices %}
              {% set raw = item.startsAt | default(item.start | default(item.starts_at | default(item.start_time | default(item.time | default(''))))) %}
              {% set ts = as_timestamp(raw, 0) %}
              {% set price = item.total | default(item.price | default(item)) | float(999999999) %}
              {% if ts > 0 and price < ns.best %}
                {% set ns.best = price %}
                {% set ns.ts = ts %}
              {% endif %}
            {% endfor %}
            {{ ns.ts > 0 and now_ts >= ns.ts and now_ts < (ns.ts + (slot_min * 60)) }}
          grid_charge_current_morning_active: >-
            {% set minute = (now().hour * 60) + now().minute %}
            {{ minute >= 480 and minute < 960 }}
          grid_charge_current_desired_a: >-
            {% set minute = (now().hour * 60) + now().minute %}
            {% if grid_charge_current_cheapest_active | bool(false) %}
              {{ states('input_number.tibber_deye_grid_charge_current_cheapest_a') | float(110) }}
            {% elif minute >= 600 and minute < 960 %}
              {{ states('input_number.tibber_deye_grid_charge_current_10_a') | float(50) }}
            {% elif minute >= 540 and minute < 600 %}
              {{ states('input_number.tibber_deye_grid_charge_current_09_a') | float(40) }}
            {% elif minute >= 480 and minute < 540 %}
              {{ states('input_number.tibber_deye_grid_charge_current_08_a') | float(20) }}
            {% elif (grid_charge_current_trigger_id | string) == 'morning_10' %}
              {{ states('input_number.tibber_deye_grid_charge_current_10_a') | float(50) }}
            {% else %}
              {{ states(grid_charge_current_entity) | float(0) }}
            {% endif %}
          grid_charge_current_should_set: >-
            {% set desired = grid_charge_current_desired_a | float(-1) %}
            {% set current = states(grid_charge_current_entity) | float(-999999) %}
            {% set fixed_time = (grid_charge_current_trigger_id | string) in ['morning_08', 'morning_09', 'morning_10'] %}
            {{ desired >= 0 and (fixed_time or (grid_charge_current_morning_active | bool(false)) or (grid_charge_current_cheapest_active | bool(false))) and ((current - desired) | abs >= 0.5) }}
      - condition: template
        value_template: "{{ grid_charge_current_should_set | bool(false) }}"
      - service: number.set_value
        continue_on_error: true
        target:
          entity_id: "{{ grid_charge_current_entity }}"
        data:
          value: >-
            {% set eid = grid_charge_current_entity %}
            {% set desired = grid_charge_current_desired_a | float(0) %}
            {% set minv = state_attr(eid, 'min') | float(0) %}
            {% set maxv = state_attr(eid, 'max') | float(desired) %}
            {{ [[desired, minv] | max, maxv] | min }}

  - id: tibber_deye_low_soc_emergency_charge
    alias: Tibber Deye - Emergency Low SOC Grid Charge v9
    description: If battery SOC becomes critically low, start a conservative grid charge immediately
    mode: single
    trigger:
      - platform: template
        value_template: >-
          {{ states('sensor.inverter_battery_capacity') | float(100) < states('input_number.tibber_deye_emergency_soc_below') | float(18) }}
    condition: []
    action:
      - service: script.turn_on
        target:
          entity_id: script.tibber_inverter_tou_mode
      - wait_template: "{{ is_state('script.tibber_inverter_tou_mode', 'off') }}"
        timeout: "00:02:00"
        continue_on_timeout: true
      - service: select.select_option
        target:
          entity_id: select.inverter_program_1_charging
        data:
          option: Grid
      - service: number.set_value
        target:
          entity_id: number.inverter_program_1_power
        data:
          value: >-
            {% set desired = states('input_number.tibber_deye_emergency_charge_power_w') | float(4000) %}
            {% set minv = state_attr('number.inverter_program_1_power', 'min') | float(0) %}
            {% set maxv = state_attr('number.inverter_program_1_power', 'max') | float(desired) %}
            {{ [[desired, minv] | max, maxv] | min }}
      - service: number.set_value
        target:
          entity_id: number.inverter_program_1_soc
        data:
          value: "{{ states('input_number.tibber_deye_emergency_charge_target_soc') | float(40) }}"
      - service: time.set_value
        target:
          entity_id: time.inverter_program_1_time
        data:
          time: "{{ now().strftime('%H:%M:%S') }}"
