              time: "{{ morning_grid_start_time }}"
              option: Grid
              power: "{{ charge_power_w }}"
              soc: "{{ charge_target_soc }}"
            - label: sell_start
              sort_key: "{{ 'm%04d' | format(sell_start_minute | int(1080)) }}"
              time: "{{ sell_start_time }}"
              option: "{{ sell_option if arbitrage_sell_active | bool(false) else 'Disabled' }}"
              power: "{{ sell_power_w if arbitrage_sell_active | bool(false) else 0 }}"
              soc: "{{ sell_stop_soc if arbitrage_sell_active | bool(false) else neutral_soc }}"
            - label: sell_end
