            {% endfor %}
            {{ ns.total / ns.count if ns.count > 0 else 0 }}
          selected_spread: "{{ (sell_avg_price | float(0)) - (charge_avg_price | float(0)) }}"
          arbitrage_enabled: >-
            {{ force_sell_export | bool(false) or (min_price_spread_eur_kwh | float(0.08)) <= 0 or (selected_spread | float(0)) >= (min_price_spread_eur_kwh | float(0.08)) }}
          sell_mode_available: "{{ true }}"
          arbitrage_sell_active: "{{ (arbitrage_enabled | bool(false)) and (sell_mode_available | bool(false)) }}"

      - alias: Calculate v9 TOU boundary helper values
        variables:
          # Deye/Solarman uses every program start time as the previous program end time.
          # v9 avoids a duplicate 00:00 boundary when the cheapest charge block starts at midnight.
          morning_grid_start_target_minute: 480
          morning_grid_start_minute: >-
            {% set morning = morning_grid_start_target_minute | int(480) %}
            {% set cs = charge_start_minute | int(-1) %}
            {% set ce = charge_end_minute | int(-1) %}
            {% if morning == cs or morning == ce %}
              {{ [morning + 1, 1439] | min }}
            {% else %}
              {{ morning }}
            {% endif %}
          morning_grid_start_time: >-
            {% set m = morning_grid_start_minute | int(480) %}
            {{ "%02d:%02d:00" | format(m // 60, m % 60) }}
          night_start_minute: >-
            {% set cs = charge_start_minute | int(0) %}
            {{ 1439 if cs == 0 else 0 }}
          night_start_time: >-
            {% set cs = charge_start_minute | int(0) %}
            {% set m = 1439 if cs == 0 else 0 %}
            {{ "%02d:%02d:00" | format(m // 60, m % 60) }}
          night_start_power_effective: >-
            {% if charge_start_minute | int(0) == 0 %}0{% else %}{{ night_power_w }}{% endif %}
          night_start_soc_effective: >-
            {% if charge_start_minute | int(0) == 0 %}{{ neutral_soc }}{% else %}{{ night_stop_soc }}{% endif %}
          after_charge_power_effective: >-
            {% if charge_end_minute | int(0) < (morning_grid_start_minute | int(480)) %}{{ night_power_w }}{% else %}0{% endif %}
          after_charge_soc_effective: >-
            {% if charge_end_minute | int(0) < (morning_grid_start_minute | int(480)) %}{{ night_stop_soc }}{% else %}{{ neutral_soc }}{% endif %}

      - alias: Build six TOU periods with unique boundaries and sort them by start time
        variables:
          schedule_items:
            - label: night_start_or_unused
              sort_key: "{{ 'm%04d' | format(night_start_minute | int(0)) }}"
              time: "{{ night_start_time }}"
              option: Disabled
              power: "{{ night_start_power_effective }}"
              soc: "{{ night_start_soc_effective }}"
            - label: charge_start
              sort_key: "{{ 'm%04d' | format(charge_start_minute | int(0)) }}"
              time: "{{ charge_start_time }}"
              option: Grid
              power: "{{ charge_power_w }}"
              soc: "{{ charge_target_soc }}"
            - label: charge_end_or_night_resume
              sort_key: "{{ 'm%04d' | format(charge_end_minute | int(0)) }}"
