# Tibber/Deye smart arbitrage package v9 - duplicate-time and force-sell fix
# Exact Solarman select options used: Grid, Disabled.
# Use either this all-in-one package OR the split files, not both.

# Copy to /config/packages/tibber_deye_smart_arbitrage_package.yaml
# Requires this in configuration.yaml:
# homeassistant:
#   packages: !include_dir_named packages
#
# Smart Tibber + Deye/Solarman arbitrage package v9 explicit writes - unique TOU boundaries and capital select options.
# Replace entity IDs if yours differ.

input_number:
  tibber_deye_battery_capacity_kwh:
    name: Tibber Deye battery capacity
    min: 1
    max: 100
    step: 0.01
    mode: box
    unit_of_measurement: kWh
    icon: mdi:battery
    initial: 20.48

  tibber_deye_charge_power_w:
    name: Tibber Deye grid charge power
    min: 500
    max: 12000
    step: 100
    mode: box
    unit_of_measurement: W
    icon: mdi:battery-charging
    initial: 5000

  tibber_deye_sell_power_w:
    name: Tibber Deye sell discharge power
    min: 500
    max: 12000
    step: 100
    mode: box
    unit_of_measurement: W
    icon: mdi:transmission-tower-export
    initial: 8000

  tibber_deye_night_power_w:
    name: Tibber Deye night self-use power
    min: 0
    max: 5000
    step: 100
    mode: box
    unit_of_measurement: W
    icon: mdi:weather-night
    initial: 600

  tibber_deye_charge_efficiency:
    name: Tibber Deye charge efficiency estimate
    min: 0.50
    max: 1.00
    step: 0.01
    mode: box
    icon: mdi:percent
    initial: 0.92

  tibber_deye_discharge_efficiency:
    name: Tibber Deye discharge efficiency estimate
    min: 0.50
    max: 1.00
    step: 0.01
    mode: box
    icon: mdi:percent
    initial: 0.92

  tibber_deye_charge_target_soc:
    name: Tibber Deye charge target SOC
    min: 20
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-90
    initial: 90

  tibber_deye_sell_stop_soc:
    name: Tibber Deye sell stop SOC
    min: 5
    max: 80
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-30
    initial: 25

  tibber_deye_night_stop_soc:
    name: Tibber Deye night stop SOC
    min: 5
    max: 80
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-20
    initial: 20

  tibber_deye_neutral_soc:
    name: Tibber Deye neutral SOC
    min: 5
    max: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-clock
    initial: 25

  tibber_deye_emergency_soc_below:
    name: Tibber Deye emergency charge below SOC
    min: 5
    max: 50
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-alert
    initial: 18

  tibber_deye_emergency_charge_target_soc:
    name: Tibber Deye emergency charge target SOC
    min: 10
    max: 90
    step: 1
    mode: slider
    unit_of_measurement: "%"
    icon: mdi:battery-charging-medium
    initial: 40

  tibber_deye_emergency_charge_power_w:
    name: Tibber Deye emergency charge power
    min: 500
    max: 12000
    step: 100
    mode: box
    unit_of_measurement: W
    icon: mdi:battery-charging-high
    initial: 4000

  tibber_deye_min_price_spread_eur_kwh:
    name: Tibber Deye minimum price spread
    min: 0
    max: 1
    step: 0.01
    mode: box
    unit_of_measurement: EUR/kWh
    icon: mdi:cash-clock
    initial: 0.08

  tibber_deye_very_expensive_price_eur_kwh:
    name: Tibber Deye very expensive sell price threshold
    min: 0
    max: 1
    step: 0.01
    mode: box
    unit_of_measurement: EUR/kWh
    icon: mdi:cash-plus
    initial: 0.35

  tibber_deye_grid_charge_current_08_a:
    name: Tibber Deye grid charge current at 08:00
    min: 0
    max: 200
    step: 1
    mode: box
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 20

  tibber_deye_grid_charge_current_09_a:
    name: Tibber Deye grid charge current at 09:00
    min: 0
    max: 200
    step: 1
    mode: box
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 40

  tibber_deye_grid_charge_current_10_a:
    name: Tibber Deye grid charge current at 10:00
    min: 0
    max: 200
    step: 1
    mode: box
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 50

  tibber_deye_grid_charge_current_cheapest_a:
    name: Tibber Deye grid charge current at cheapest slot
    min: 0
    max: 200
    step: 1
    mode: box
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 110

input_boolean:
  tibber_deye_force_sell_export:
    name: Tibber Deye force sell export
    icon: mdi:transmission-tower-export
    initial: true

  tibber_deye_debug_notifications:
    name: Tibber Deye debug notifications
    icon: mdi:message-alert
    initial: false

input_text:
  tibber_deye_manual_sell_option:
    name: Tibber Deye manual sell option override
    max: 60
    mode: text
    icon: mdi:form-textbox

script:
  tibber_inverter_tou_mode:
    alias: Tibber inverter TOU mode
    description: Placeholder hook to enable Deye Time Of Use / Selling First before writing periods
    mode: single
    sequence:
      - delay: "00:00:01"

  # Optional helper: trigger the full smart schedule recalculation from Developer Tools -> Services.
  tibber_deye_recalculate_now:
    alias: Tibber Deye recalculate smart schedule now
    mode: single
    sequence:
      - event: tibber_deye_recalculate_schedule
        event_data:
          source: script.tibber_deye_recalculate_now

  # Optional helper: show the currently visible debug sensors.
  tibber_deye_show_debug:
    alias: Tibber Deye show debug values
    mode: single
    sequence:
      - service: persistent_notification.create
        data:
          title: Tibber Deye debug
          message: >-
            Price day: {{ states('sensor.tibber_deye_selected_price_day') }}.
            Slots: {{ states('sensor.tibber_deye_price_slots_count') }}.
            Cheapest single slot: {{ states('sensor.tibber_deye_cheapest_single_slot_time') }}.
            Highest single slot: {{ states('sensor.tibber_deye_highest_single_slot_time') }}.
            Battery SOC: {{ states('sensor.inverter_battery_capacity') }}%.

template:
  - sensor:
      - name: Tibber Deye selected price day
        unique_id: tibber_deye_selected_price_day
        icon: mdi:calendar-clock
        state: >-
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {{ 'tomorrow' if now().hour >= 23 and tomorrow | count > 0 else 'today' }}

      - name: Tibber Deye price slots count
        unique_id: tibber_deye_price_slots_count
        icon: mdi:timetable
        unit_of_measurement: slots
        state: >-
          {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
          {{ prices | count }}

      - name: Tibber Deye slot minutes
        unique_id: tibber_deye_slot_minutes
        icon: mdi:timer-outline
        unit_of_measurement: min
        state: >-
          {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
          {{ 15 if prices | count > 24 else 60 }}

      - name: Tibber Deye cheapest single slot time
        unique_id: tibber_deye_cheapest_single_slot_time
        icon: mdi:cash-minus
        state: >-
          {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
          {% set slot = 15 if prices | count > 24 else 60 %}
          {% set ns = namespace(best=999999999, index=0) %}
          {% for item in prices %}
            {% set price = item.total | default(item.price | default(item)) | float(999999999) %}
            {% if price < ns.best %}
              {% set ns.best = price %}
              {% set ns.index = loop.index0 %}
            {% endif %}
          {% endfor %}
          {% set m = ns.index * slot %}
          {{ "%02d:%02d:00" | format(m // 60, m % 60) }}
        attributes:
          price: >-
            {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
            {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
            {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
            {% set ns = namespace(best=999999999) %}
            {% for item in prices %}
              {% set price = item.total | default(item.price | default(item)) | float(999999999) %}
              {% if price < ns.best %}{% set ns.best = price %}{% endif %}
            {% endfor %}
            {{ ns.best }}

      - name: Tibber Deye highest single slot time
        unique_id: tibber_deye_highest_single_slot_time
        icon: mdi:cash-plus
        state: >-
          {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
          {% set slot = 15 if prices | count > 24 else 60 %}
          {% set ns = namespace(best=-999999999, index=0) %}
          {% for item in prices %}
            {% set price = item.total | default(item.price | default(item)) | float(-999999999) %}
            {% if price > ns.best %}
              {% set ns.best = price %}
              {% set ns.index = loop.index0 %}
            {% endif %}
          {% endfor %}
          {% set m = ns.index * slot %}
          {{ "%02d:%02d:00" | format(m // 60, m % 60) }}
        attributes:
          price: >-
            {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
            {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
            {% set prices = tomorrow if now().hour >= 23 and tomorrow | count > 0 else today %}
            {% set ns = namespace(best=-999999999) %}
            {% for item in prices %}
              {% set price = item.total | default(item.price | default(item)) | float(-999999999) %}
              {% if price > ns.best %}{% set ns.best = price %}{% endif %}
            {% endfor %}
            {{ ns.best }}

automation:
  - id: tibber_deye_smart_dynamic_charge_and_sell_schedule
    alias: Tibber Deye - Smart Dynamic Charge and Sell Schedule v9
    description: Calculates charge/sell durations and writes a sorted 6-period Deye TOU schedule using explicit static entity targets
    mode: restart
    trigger:
      - platform: time
        at: "00:30:00"
      - platform: time
        at: "15:30:00"
      - platform: homeassistant
        event: start
      - platform: event
        event_type: tibber_deye_recalculate_schedule
    condition:
      - condition: template
        value_template: >-
          {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
          {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
          {{ today | count > 0 or tomorrow | count > 0 }}
    action:
      - alias: Fetch 48h price slots via tibber.get_prices when available
        service: tibber.get_prices
        continue_on_error: true
        data:
          start: "{{ now().replace(minute=0, second=0, microsecond=0).isoformat() }}"
          end: "{{ (now().replace(minute=0, second=0, microsecond=0) + timedelta(days=2)).isoformat() }}"
        response_variable: tibber_prices_response

      - alias: Define constants and select today/tomorrow price list
        variables:
          battery_capacity_kwh: "{{ states('input_number.tibber_deye_battery_capacity_kwh') | float(20.48) }}"
          charge_power_w: "{{ states('input_number.tibber_deye_charge_power_w') | float(5000) }}"
          sell_power_w: "{{ states('input_number.tibber_deye_sell_power_w') | float(10000) }}"
          night_power_w: "{{ states('input_number.tibber_deye_night_power_w') | float(600) }}"
          charge_efficiency: "{{ states('input_number.tibber_deye_charge_efficiency') | float(0.92) }}"
          discharge_efficiency: "{{ states('input_number.tibber_deye_discharge_efficiency') | float(0.92) }}"
          charge_target_soc: "{{ states('input_number.tibber_deye_charge_target_soc') | float(90) }}"
          sell_stop_soc: "{{ states('input_number.tibber_deye_sell_stop_soc') | float(25) }}"
          night_stop_soc: "{{ states('input_number.tibber_deye_night_stop_soc') | float(20) }}"
          neutral_soc: "{{ states('input_number.tibber_deye_neutral_soc') | float(25) }}"
          min_price_spread_eur_kwh: "{{ states('input_number.tibber_deye_min_price_spread_eur_kwh') | float(0.08) }}"
          force_sell_export: >-
            {% set force_state = states('input_boolean.tibber_deye_force_sell_export') %}
            {{ force_state in ['on', 'unknown', 'unavailable'] }}
          manual_sell_option_requested: >-
            {% set raw = states('input_text.tibber_deye_manual_sell_option') %}
            {% if raw in ['unknown', 'unavailable', 'none', 'None'] %}
              {% set raw = '' %}
            {% endif %}
            {{ raw | trim }}
          sell_options_program_1: "{{ state_attr('select.inverter_program_1_charging', 'options') or [] }}"
          sell_options_program_2: "{{ state_attr('select.inverter_program_2_charging', 'options') or [] }}"
          sell_options_program_3: "{{ state_attr('select.inverter_program_3_charging', 'options') or [] }}"
          sell_options_program_4: "{{ state_attr('select.inverter_program_4_charging', 'options') or [] }}"
          sell_options_program_5: "{{ state_attr('select.inverter_program_5_charging', 'options') or [] }}"
          sell_options_program_6: "{{ state_attr('select.inverter_program_6_charging', 'options') or [] }}"
          sell_option: >-
            {% set option_sources = [
              sell_options_program_1,
              sell_options_program_2,
              sell_options_program_3,
              sell_options_program_4,
              sell_options_program_5,
              sell_options_program_6
            ] %}
            {% set requested = manual_sell_option_requested | string | trim %}
            {% set requested_l = requested | lower %}
            {% set ns = namespace(all=[], value='') %}
            {% for src in option_sources %}
              {% for opt in src %}
                {% if opt not in ns.all %}
                  {% set ns.all = ns.all + [opt] %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% if requested != '' %}
              {% for opt in ns.all %}
                {% set l = (opt | string | lower) %}
                {% if l == requested_l and ('sell' in l or 'export' in l or 'feed' in l or 'discharge' in l) %}
                  {% set ns.value = opt %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% if ns.value == '' %}
              {% for opt in ns.all %}
                {% if (opt | string | lower) == 'sell' %}
                  {% set ns.value = opt %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% if ns.value == '' %}
              {% for opt in ns.all %}
                {% set l = (opt | string | lower) %}
                {% if 'sell' in l or 'export' in l or 'feed' in l or 'discharge' in l %}
                  {% set ns.value = opt %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% if ns.value == '' %}
              {% for opt in ns.all %}
                {% if (opt | string | lower) == 'disabled' %}
                  {% set ns.value = opt %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {{ ns.value if ns.value != '' else 'Disabled' }}
          current_soc: "{{ states('sensor.inverter_battery_capacity') | float(25) }}"
          using_tomorrow: "false"
          prices_window: >-
            {% set r = tibber_prices_response | default(none) %}
            {% set ns = namespace(items=[]) %}
            {% if r is mapping %}
              {% set direct = r.prices | default([]) %}
              {% if direct is mapping %}
                {% for k, v in direct.items() %}
                  {% if v is sequence and v is not string and v | count > 0 %}
                    {% set ns.items = ns.items + (v | list) %}
                  {% endif %}
                {% endfor %}
              {% elif direct is sequence and direct is not string and direct | count > 0 %}
                {% set ns.items = direct %}
              {% elif r.data is mapping %}
                {% set nested = r.data.prices | default(r.data.forecast | default([])) %}
                {% if nested is mapping %}
                  {% for k, v in nested.items() %}
                    {% if v is sequence and v is not string and v | count > 0 %}
                      {% set ns.items = ns.items + (v | list) %}
                    {% endif %}
                  {% endfor %}
                {% elif nested is sequence and nested is not string and nested | count > 0 %}
                  {% set ns.items = nested %}
                {% endif %}
              {% elif r.data is sequence and r.data is not string and r.data | count > 0 %}
                {% set ns.items = r.data %}
              {% elif r.result is mapping %}
                {% set nested = r.result.prices | default(r.result.forecast | default([])) %}
                {% if nested is mapping %}
                  {% for k, v in nested.items() %}
                    {% if v is sequence and v is not string and v | count > 0 %}
                      {% set ns.items = ns.items + (v | list) %}
                    {% endif %}
                  {% endfor %}
                {% elif nested is sequence and nested is not string and nested | count > 0 %}
                  {% set ns.items = nested %}
                {% endif %}
              {% elif r.result is sequence and r.result is not string and r.result | count > 0 %}
                {% set ns.items = r.result %}
              {% endif %}
            {% elif r is sequence and r is not string and r | count > 0 %}
              {% set ns.items = r %}
            {% endif %}
            {% if ns.items | count > 0 %}
              {{ ns.items }}
            {% else %}
              {% set today = state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or [] %}
              {% set tomorrow = state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or [] %}
              {{ (today + tomorrow) if (today | count > 0 or tomorrow | count > 0) else [] }}
            {% endif %}
          price_count: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {{ prices | count }}
          slot_minutes: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% if prices | count > 1 %}
              {% set a = prices[0] %}
              {% set b = prices[1] %}
              {% set a_ts = as_timestamp(a.startsAt | default(a.start | default(a.starts_at | default(a.start_time | default(a.time | default(''))))), 0) %}
              {% set b_ts = as_timestamp(b.startsAt | default(b.start | default(b.starts_at | default(b.start_time | default(b.time | default(''))))), 0) %}
              {% set diff = ((b_ts - a_ts) / 60) | int(0) %}
              {{ diff if diff in [15, 30, 60] else (15 if prices | count > 24 else 60) }}
            {% else %}
              {{ 15 if prices | count > 24 else 60 }}
            {% endif %}
          min_start_index: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set slot = 15 if prices | count > 24 else 60 %}
            {% set ns = namespace(idx=-1) %}
            {% set now_ts = as_timestamp(now()) %}
            {% for i in range(0, prices | count) %}
              {% set item = prices[i] %}
              {% set ts = as_timestamp(item.startsAt | default(item.start | default(item.starts_at | default(item.start_time | default(item.time | default(''))))), 0) %}
              {% if ns.idx == -1 and ts > 0 and ts >= now_ts %}
                {% set ns.idx = i %}
              {% endif %}
            {% endfor %}
            {% if ns.idx >= 0 %}
              {{ ns.idx }}
            {% else %}
              {{ ((now().hour * 60 + now().minute + slot - 1) // slot) | int }}
            {% endif %}

      - alias: Stop if no usable price slots are available
        if:
          - condition: template
            value_template: "{{ price_count | int(0) <= 0 }}"
        then:
          - service: persistent_notification.create
            data:
              title: Tibber Deye schedule skipped
              message: >-
                No usable Tibber price slots were found from sensor.YOUR_HOME_electricity_price.
                The schedule was not rewritten, so the inverter keeps its previous TOU settings.
                State: {{ states('sensor.YOUR_HOME_electricity_price') }}.
                normalized slot count: {{ price_count }}.
                today count: {{ (state_attr('sensor.YOUR_HOME_electricity_price', 'today') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_today') or state_attr('sensor.YOUR_HOME_electricity_price', 'forecast') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices') or []) | count }}.
                tomorrow count: {{ (state_attr('sensor.YOUR_HOME_electricity_price', 'tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'raw_tomorrow') or state_attr('sensor.YOUR_HOME_electricity_price', 'prices_tomorrow') or []) | count }}.
                Check whether tibber.get_prices is available and returning a 48h slot list.
          - stop: "No usable Tibber price slots"

      - alias: Calculate required charge duration
        variables:
          planning_soc: >-
            {{ current_soc | float(25) }}
          charge_slot_kwh: >-
            {{ (charge_power_w | float(5000) / 1000) * (slot_minutes | float(60) / 60) * (charge_efficiency | float(0.92)) }}
          charge_energy_needed_kwh: >-
            {% set needed = (((charge_target_soc | float(90)) - (planning_soc | float(25))) / 100) * (battery_capacity_kwh | float(20.48)) %}
            {{ [needed, 0] | max }}
          charge_slots: >-
            {% set needed = charge_energy_needed_kwh | float(0) %}
            {% set slot_kwh = charge_slot_kwh | float(1) %}
            {% if needed <= 0 or slot_kwh <= 0 %}
              1
            {% else %}
              {{ [(needed / slot_kwh) | round(0, 'ceil') | int, 1] | max }}
            {% endif %}

      - alias: Find cheapest contiguous charging block
        variables:
          charge_start_index: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set slots = charge_slots | int(1) %}
            {% set n = prices | count %}
            {% set min_i = min_start_index | int(0) %}
            {% if n <= 0 %}
              0
            {% else %}
              {% set slots = [slots, n] | min %}
              {% set max_i = n - slots %}
              {% if max_i < min_i %}
                {{ [min_i, n - 1] | min }}
              {% else %}
                {% set ns = namespace(best_sum=999999999, best_index=min_i) %}
                {% for i in range(min_i, max_i + 1) %}
                  {% set block = namespace(total=0, ok=true) %}
                  {% for j in range(i, i + slots) %}
                    {% set item = prices[j] %}
                    {% set price = item.total | default(item.price | default(item)) | float(999999) %}
                    {% if price == 999999 %}{% set block.ok = false %}{% endif %}
                    {% set block.total = block.total + price %}
                  {% endfor %}
                  {% if block.ok and block.total < ns.best_sum %}
                    {% set ns.best_sum = block.total %}
                    {% set ns.best_index = i %}
                  {% endif %}
                {% endfor %}
                {{ ns.best_index }}
              {% endif %}
            {% endif %}

      - alias: Convert charge block to start/end times
        variables:
          charge_start_index_effective: >-
            {% set csi = charge_start_index | int(0) %}
            {% if now().hour < 23 and csi == 0 %}
              {{ min_start_index | int(0) }}
            {% else %}
              {{ csi }}
            {% endif %}
          charge_start_minute: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set i = charge_start_index_effective | int(0) %}
            {% set item = prices[i] if i >= 0 and i < (prices | count) else none %}
            {% if item is mapping %}
              {% set start_raw = item.startsAt | default(item.start | default(item.starts_at | default(item.start_time | default(item.time | default(''))))) %}
              {% set ts = as_timestamp(start_raw, 0) %}
              {% if ts > 0 %}
                {% set dt = as_local(as_datetime(start_raw)) %}
                {{ (dt.hour * 60) + dt.minute }}
              {% else %}
                {{ (i * (slot_minutes | int(60))) | int }}
              {% endif %}
            {% else %}
              {{ (i * (slot_minutes | int(60))) | int }}
            {% endif %}
          charge_end_index: "{{ (charge_start_index_effective | int(0)) + (charge_slots | int(1)) }}"
          charge_end_minute: >-
            {% set end_minute = (charge_start_minute | int(0)) + ((charge_slots | int(1)) * (slot_minutes | int(60))) %}
            {{ [end_minute, 1439] | min }}
          charge_start_time: >-
            {% set m = charge_start_minute | int(0) %}
            {{ "%02d:%02d:00" | format(m // 60, m % 60) }}
          charge_end_time: >-
            {% set m = charge_end_minute | int(0) %}
            {{ "%02d:%02d:00" | format(m // 60, m % 60) }}

      - alias: Calculate available sell duration
        variables:
          estimated_sell_start_soc: >-
            {{ [charge_target_soc | float(90), current_soc | float(25)] | max }}
          sell_slot_kwh: >-
            {{ (sell_power_w | float(10000) / 1000) * (slot_minutes | float(60) / 60) }}
          sell_energy_available_kwh: >-
            {% set available = (((estimated_sell_start_soc | float(90)) - (sell_stop_soc | float(25))) / 100) * (battery_capacity_kwh | float(20.48)) * (discharge_efficiency | float(0.92)) %}
            {{ [available, 0] | max }}
          sell_slots: >-
            {% set available = sell_energy_available_kwh | float(0) %}
            {% set slot_kwh = sell_slot_kwh | float(1) %}
            {% if available <= 0 or slot_kwh <= 0 %}
              1
            {% else %}
              {{ [(available / slot_kwh) | round(0, 'ceil') | int, 1] | max }}
            {% endif %}

      - alias: Find most expensive contiguous selling block after charge where possible
        variables:
          sell_start_index: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set slots = sell_slots | int(1) %}
            {% set n = prices | count %}
            {% set after_charge_i = charge_end_index | int(0) %}
            {% set min_i = [min_start_index | int(0), after_charge_i] | max %}
            {% if n <= 0 %}
              18
            {% else %}
              {% set slots = [slots, n] | min %}
              {% set max_i = n - slots %}
              {% if max_i < min_i %}
                {% set min_i = min_start_index | int(0) %}
              {% endif %}
              {% if max_i < min_i %}
                {{ [min_i, n - 1] | min }}
              {% else %}
                {% set ns = namespace(best_sum=-999999999, best_index=min_i) %}
                {% for i in range(min_i, max_i + 1) %}
                  {% set block = namespace(total=0, ok=true) %}
                  {% for j in range(i, i + slots) %}
                    {% set item = prices[j] %}
                    {% set price = item.total | default(item.price | default(item)) | float(-999999) %}
                    {% if price == -999999 %}{% set block.ok = false %}{% endif %}
                    {% set block.total = block.total + price %}
                  {% endfor %}
                  {% if block.ok and block.total > ns.best_sum %}
                    {% set ns.best_sum = block.total %}
                    {% set ns.best_index = i %}
                  {% endif %}
                {% endfor %}
                {{ ns.best_index }}
              {% endif %}
            {% endif %}

      - alias: Convert sell block to start/end times
        variables:
          sell_start_minute: >-
            {% set prices = prices_window if prices_window is sequence and prices_window is not string else [] %}
            {% set i = sell_start_index | int(0) %}
            {% set item = prices[i] if i >= 0 and i < (prices | count) else none %}
            {% if item is mapping %}
              {% set start_raw = item.startsAt | default(item.start | default(item.starts_at | default(item.start_time | default(item.time | default(''))))) %}
              {% set ts = as_timestamp(start_raw, 0) %}
              {% if ts > 0 %}
                {% set dt = as_local(as_datetime(start_raw)) %}
                {{ (dt.hour * 60) + dt.minute }}
              {% else %}
                {{ (i * (slot_minutes | int(60))) | int }}
              {% endif %}
            {% else %}
              {{ (i * (slot_minutes | int(60))) | int }}
            {% endif %}
          sell_end_minute: >-
            {% set end_minute = (sell_start_minute | int(0)) + ((sell_slots | int(1)) * (slot_minutes | int(60))) %}
